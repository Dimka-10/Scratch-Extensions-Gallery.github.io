<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новые дополнения для Scratch-модов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <h1>Dimka10 | it</h1>
        <p>
            На сайте находятся дополнения, которые я собирал,
            коллекционировал и делал сам.
            Надеюсь, они будут полезны вам!
        </p>
    </header>

    <section id="links-section">
        <h2>Ссылки</h2>

        <ul>
            <li>
                <a href="https://www.youtube.com/@Dimka10game" target="_blank">
                    YouTube канал
                </a>
            </li>

            <li>
                <a href="https://scratch.mit.edu/users/Dimka10/" target="_blank">
                    Scratch аккаунт
                </a>
            </li>

            <li>
                <a href="https://www.donationalerts.com/r/dimka10" target="_blank">
                    Поддержать проект
                </a>
            </li>

            <li>
                <a href="https://t.me/dimka10it" target="_blank">
                    Telegram канал
                </a>
            </li>
        </ul>
    </section>

    <main>

        <!-- Главная страница -->
        <section id="addons-page">

            <h2>Дополнения</h2>

            <div class="search-container">
                <input
                    type="text"
                    id="search"
                    placeholder="Поиск дополнений..."
                    oninput="filterAddons()"
                >
            </div>

            <div class="addons-container"></div>

        </section>

        <!-- Страница одного дополнения -->
        <section id="addon-page" style="display:none;">

            <button id="back-button">
                ← Назад на главную
            </button>

            <div class="addon-view">

                <img
                    id="addon-image"
                    src=""
                    alt=""
                >

                <h1 id="addon-title"></h1>

                <p id="addon-author"></p>

                <p id="addon-description"></p>

                <div class="buttons-container">

                    <a
                        id="download-button"
                        class="download-button"
                        download
                    >
                        Скачать
                    </a>

                    <button
                        id="copy-button"
                        class="copy-button"
                    >
                        Копировать код
                    </button>

                </div>

            </div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Dimka10</p>
    </footer>

    <script src="extension.js"></script>
    <script src="script.js"></script>

</body>
</html>
